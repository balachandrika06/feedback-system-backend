spring.application.name=feedback-system-backend

# Server Configuration
server.port=8080

# Database Configuration - Use environment variables for cloud deployment
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/feedback_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Music#0209}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# CORS Configuration - Allow your Vercel frontend
cors.allowed.origins=${CORS_ORIGINS:https://feedback-portal-lake.vercel.app,http://localhost:5173}

# Logging
logging.level.com.feedback=INFO
logging.level.org.springframework.web=INFO